name: Update GitHub Stats SVG
on:
  schedule:
    - cron: "0 0 * * *"  # 每天UTC 0点自动更新（国内8点）
  workflow_dispatch:     # 允许手动触发更新
  push:
    branches: [main]     # 推送到main时也更新

permissions:
  contents: write        # 允许Action提交SVG到仓库

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 生成 总统计卡片 stats.svg
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # 替换成你的用户名，加你要的参数（颜色、图标等）
          options: username=geek-larry&show_icons=true&theme=default&bg_color=ffffff&title_color=C85252&text_color=333333&icon_color=5AA06F
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      # 2. 生成 常用语言卡片 top-langs.svg
      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=geek-larry&layout=compact&langs_count=8&theme=default&bg_color=ffffff&title_color=5A83B4&text_color=333333
          path: profile/top-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      # 3. 提交并推送生成的SVG到仓库
      - name: Commit & Push SVG Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update stats SVG [automated]" || exit 0
          git push
